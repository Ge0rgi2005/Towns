<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Towns</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jqueryui/1.8.5/jquery-ui.min.js"></script>
    <link rel="stylesheet" href="towns.css" />
</head>
<body>

    <article>
        <header>Towns</header>
        <label for="towns"></label><select id="towns" size="4">
            <option>Sofia</option>
            <option>Plovdiv</option>
            <option>Varna</option>
            <option>Bourgas</option>
        </select>
    </article>

    <article>
        <header>Add New Town</header>
        <label for="townNameForAdd"></label><input type="text" id="townNameForAdd" placeholder="Town name..." />
        <button id="btnAdd">Add</button>
    </article>

    <article>
        <header>Delete Existing Town</header>
        <label for="townName"></label><input type="text" id="townName" placeholder="Town name..." />
        <button id="btnDelete">Delete</button>
    </article>

    <article>
        <header>Shuffle Towns</header>
        <button id="btnShuffle">Shuffle</button>
    </article>

    <div id="result"></div>

    <script src="towns.js"></script>
</body>
</html>
